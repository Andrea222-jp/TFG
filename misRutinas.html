<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis Rutinas</title>
<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: #fff8f6;
  padding: 20px;
}

h2 {
  text-align: center;
  color: #d57a8a;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 18px;
  margin: 25px auto;
  max-width: 600px;
  box-shadow: 0 8px 25px rgba(255, 192, 203, 0.3);
  border: 1.5px solid #f7d1d8;
}

.info {
  margin-bottom: 10px;
  color: #5a3f49;
}

.productos {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
}

.producto {
  width: 100px;
  text-align: center;
  text-decoration: none;
  color: #5a3f49;
  font-size: 12px;
}

.producto img {
  width: 100%;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.producto img:hover {
  transform: scale(1.05);
}

.producto span {
  display: block;
  margin-top: 5px;
}
</style>
</head>

<body>

<h2>Mis rutinas guardadas</h2>

<div id="contenedorRutinas"></div>

<script src="rutinas.js"></script>
<script src="misRutinas.js"></script>

</body>
</html>
