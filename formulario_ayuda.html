<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ayuda para descubrir tu piel</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />

<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: #fff8f6;
  margin: 0;
  padding: 30px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #4a4a4a;
}

form {
  background: #fff;
  padding: 40px 35px;
  border-radius: 18px;
  box-shadow: 0 8px 25px rgba(255, 192, 203, 0.3);
  max-width: 500px;
  width: 100%;
  border: 1.5px solid #f7d1d8;
}

h2 {
  margin-bottom: 25px;
  font-size: 2rem;
  text-align: center;
  color: #d57a8a;
}

p.info {
  font-size: 0.9rem;
  color: #a87d8c;
  margin-bottom: 10px;
}

.section {
  margin-bottom: 25px;
}

.radio-group, .checkbox-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

label {
  font-weight: 500;
  cursor: pointer;
}

button {
  background: #d57a8a;
  color: #fff;
  padding: 14px;
  border: none;
  border-radius: 16px;
  font-size: 1.1rem;
  cursor: pointer;
  width: 100%;
  margin-top: 10px;
}

#resumen {
  max-width: 500px;
  background: #fff;
  border-radius: 18px;
  padding: 25px;
  margin-top: 20px;
  display: none;
}
</style>
</head>

<body>

<form id="formAyuda">

<h2>Descubre tu tipo de piel</h2>

<!-- TIPO PIEL -->
<div class="section">
  <label>¿Cómo describirías tu piel?</label>
  <p class="info">Selecciona la opción que mejor te represente</p>

  <div class="radio-group">
    <label><input type="radio" name="tipoPiel" value="seca" required> Seca (tirante, descamada)</label>
    <label><input type="radio" name="tipoPiel" value="mixta"> Mixta (zona T grasa)</label>
    <label><input type="radio" name="tipoPiel" value="grasa"> Grasa (brillos, poros visibles)</label>
    <label><input type="radio" name="tipoPiel" value="sensible"> Sensible (reacciona fácilmente)</label>
    <label><input type="radio" name="tipoPiel" value="normal"> Normal (equilibrada)</label>
    <label><input type="radio" name="tipoPiel" value="madura"> Madura (pérdida de firmeza, arrugas)</label>
  </div>
</div>
<!-- SENSIBILIDAD -->
<div class="section">
  <label>¿Tu piel reacciona fácilmente?</label>
  <p class="info">Ej: enrojecimiento, picor, ardor</p>
  <div class="radio-group">
    <label><input type="radio" name="sensibilidad" value="alta" required> Mucho</label>
    <label><input type="radio" name="sensibilidad" value="media"> A veces</label>
    <label><input type="radio" name="sensibilidad" value="baja"> Nunca</label>
  </div>
</div>

<!-- PROBLEMAS -->
<div class="section checkbox-group">
  <label>Problemas principales</label>
  <p class="info">Selecciona los que más te afectan</p>

  <label><input type="checkbox" name="problemas" value="acne"> Acné</label>
  <label><input type="checkbox" name="problemas" value="rojeces"> Rojeces</label>
  <label><input type="checkbox" name="problemas" value="deshidratacion"> Deshidratación</label>
  <label><input type="checkbox" name="problemas" value="arrugas"> Arrugas</label>
  <label><input type="checkbox" name="problemas" value="manchas"> Manchas / pigmentación</label>
  <label><input type="checkbox" name="problemas" value="sensibilidad"> Sensibilidad extrema / alergias</label>
  <label><input type="checkbox" name="problemas" value="poros"> Poros dilatados</label>
  <label><input type="checkbox" name="problemas" value="congestion"> Piel congestionada</label>
  <label><input type="checkbox" name="problemas" value="luminosidad"> Piel apagada / falta de luminosidad</label>
  <label><input type="checkbox" name="problemas" value="ninguno"> Ninguno</label>
</div>

<!-- BRILLO -->
<div class="section">
  <label>¿Cuánto brillo tienes durante el día?</label>
  <div class="radio-group">
    <label><input type="radio" name="brillo" value="alto" required> Mucho brillo</label>
    <label><input type="radio" name="brillo" value="medio"> Solo zona T</label>
    <label><input type="radio" name="brillo" value="bajo"> Nada</label>
  </div>
</div>

<!-- TIRANTEZ -->
<div class="section">
  <label>¿Notas tirantez después de limpiar?</label>
  <div class="radio-group">
    <label><input type="radio" name="tirantez" value="si" required> Sí</label>
    <label><input type="radio" name="tirantez" value="no"> No</label>
  </div>
</div>

<!-- BOTÓN -->
<button type="submit">Ver resultado</button>

</form>

<div id="resumen">
  <h3>Tu diagnóstico</h3>
  <p id="resumen-text"></p>
</div>

<script>
document.getElementById('formAyuda').addEventListener('submit', function(e) {
  e.preventDefault();

  const form = e.target;

  const tipos = Array.from(form.querySelectorAll('input[name="tipoPiel"]:checked')).map(cb => cb.value);
  const problemas = Array.from(form.querySelectorAll('input[name="problemas"]:checked')).map(cb => cb.value);

  const texto = `
  Tu piel parece: ${tipos.join(", ")}.<br>
  Problemas: ${problemas.join(", ")}.<br><br>

  💡 Recomendación general:<br>
  Usa productos suaves, hidrata bien tu piel y evita sobrecargarla con demasiados activos.
  `;

  document.getElementById('resumen-text').innerHTML = texto;
  document.getElementById('resumen').style.display = "block";
});
</script>

</body>
</html>
