<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Estadísticas</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />

<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: #fff8f6;
  margin: 0;
  padding: 30px 20px;
  text-align: center;
  color: #4a4a4a;
}

h2 {
  color: #d57a8a;
  margin-bottom: 30px;
  text-transform: uppercase;
}

/* CONTENEDOR */
.graficas {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px;
}

/* TARJETAS */
.card {
  background: #fff;
  padding: 20px;
  border-radius: 18px;
  width: 320px;
  height: 320px;
  box-shadow: 0 8px 25px rgba(255, 192, 203, 0.3);
  border: 1.5px solid #f7d1d8;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* CANVAS */
.card canvas {
  width: 100% !important;
  height: 100% !important;
}
</style>

</head>

<body>

<h2>Estadísticas de usuarios</h2>

<div class="graficas">

  <div class="card">
    <canvas id="graficaPiel"></canvas>
  </div>

  <div class="card">
    <canvas id="graficaProblemas"></canvas>
  </div>

</div>

<!-- JS -->
<script src="estadisticas.js"></script>

</body>
</html>
