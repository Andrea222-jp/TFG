<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Skincare</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />

<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: #fff8f6;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: #4a4a4a;
}

.container {
  background: #fff;
  padding: 45px 35px;
  border-radius: 18px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 8px 25px rgba(255, 192, 203, 0.3);
  border: 1.5px solid #f7d1d8;
}

h2 {
  margin-bottom: 35px; /* 💥 más aire arriba */
  font-weight: 600;
  font-size: 2rem;
  text-align: center;
  color: #d57a8a;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

input {
  width: 100%;
  padding: 14px 18px;
  margin-bottom: 20px; /* 💥 separación entre inputs */
  border-radius: 12px;
  border: 1.8px solid #f1b9c9;
  font-size: 1rem;
  color: #5a3f49;
  background-color: #fff6f8;
  transition: 0.3s ease;
  box-sizing: border-box;
}

input:focus {
  border-color: #d57a8a;
  outline: none;
  box-shadow: 0 0 8px rgba(213, 122, 138, 0.5);
  background-color: #fff;
}

button {
  background: #d57a8a;
  color: #fff;
  padding: 14px;
  margin-top: 10px; /* 💥 espacio con el último input */
  border: none;
  border-radius: 16px;
  font-size: 1.1rem;
  cursor: pointer;
  width: 100%;
  transition: 0.3s ease;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  box-shadow: 0 5px 15px rgba(213, 122, 138, 0.6);
}

button:hover {
  background: #b75d68;
  box-shadow: 0 8px 20px rgba(183, 93, 104, 0.8);
}

.toggle {
  text-align: center;
  margin-top: 25px; /* 💥 más separación */
  cursor: pointer;
  color: #a87d8c;
  font-weight: 600;
  transition: 0.3s;
}

.toggle:hover {
  color: #d57a8a;
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

  <h2 id="titulo">Login</h2>

  <input type="text" id="nombre" placeholder="Nombre" style="display:none;">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Contraseña">

  <button onclick="accion()">Entrar</button>

  <div class="toggle" onclick="cambiarModo()">
    ¿No tienes cuenta? Regístrate
  </div>

</div>

<script>
let modoRegistro = false;

function cambiarModo() {
  modoRegistro = !modoRegistro;

  document.getElementById("titulo").innerText = modoRegistro ? "Registro" : "Login";
  document.getElementById("nombre").style.display = modoRegistro ? "block" : "none";
  document.querySelector("button").innerText = modoRegistro ? "Registrarse" : "Entrar";
  document.querySelector(".toggle").innerText = modoRegistro 
    ? "¿Ya tienes cuenta? Inicia sesión"
    : "¿No tienes cuenta? Regístrate";
}

async function accion() {

  const nombre = document.getElementById("nombre").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Completa los campos");
    return;
  }

  const url = modoRegistro 
    ? "http://localhost:3000/registro"
    : "http://localhost:3000/login";

  const body = modoRegistro
    ? { nombre, email, password }
    : { email, password };

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error);
      return;
    }

    alert(data.mensaje);

    if (!modoRegistro) {
      localStorage.setItem("sesion", email);
      window.location.href = "skincare.html";
    }

  } catch (error) {
    alert("Error conectando con el servidor");
    console.error(error);
  }
}
</script>

</body>
</html>
