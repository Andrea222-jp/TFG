<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkinMatch - Formulario</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ===== MODO OSCURO ===== */
body.dark {
  background:
    linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)),
    url("img/portada.webp");
  background-position:center;
  background-size:cover;
  background-repeat:no-repeat;
  background-color:#121212;
  color:white;
}

body.dark form {
  background:rgba(28,28,28,.28);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:
    0 25px 50px rgba(0,0,0,.35),
    0 10px 20px rgba(255,255,255,.03);
}

body.dark .badge,
body.dark .section-title {
  background:rgba(255,255,255,.08);
  color:#ffb6c7;
}

body.dark select,
body.dark input {
  background:#2a2a2a;
  border:1px solid #3a3a3a;
  color:white;
}

body.dark select option {
  background:#2a2a2a;
  color:white;
}

body.dark .option-card,
body.dark .problem-card {
  background:#3a3a3a;
  border:1px solid #555;
  color:white;
}

body.dark .option-grid input:checked + .option-card,
body.dark .problem-grid input:checked + .problem-card {
  background:linear-gradient(135deg,#d97f98,#e79db2);
  color:white;
  border-color:#d97f98;
}

body.dark .btn-principal {
  background:linear-gradient(135deg,#d97f98,#e79db2);
  color:white;
}

body.dark .btn-secundario {
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
  color:white;
}

body.dark .btn-secundario:hover {
  background:rgba(255,255,255,.14);
}

body.dark .help-link a {
  color:#d1d1d1;
}

body.dark #rutinaRecomendada .card {
  background:rgba(40,40,40,.92);
  border:1px solid rgba(255,255,255,.08);
  color:white;
}

/* Modo oscuro para la caja de IA */
body.dark .explicacion {
  background: rgba(255,255,255,0.88);
  color: #000;
}

body.dark .explicacion .ia-texto {
  color: #000;
}

body.dark .explicacion h3,
body.dark .explicacion h4 {
  color: #d97f98;
}

.dark-toggle {
  position: absolute;   /* cambia fixed a absolute */
  top: 20px;
  right: 20px;          /* cambia left a right */
  z-index: 1000;        /* opcional, puedes mantener 999 */
}

/* Estilo botón de modo oscuro */
#toggleDark {
  display: flex;             
  align-items: center;      
  justify-content: center;   
  width: 50px;               
  height: 50px;             
  font-size: 1.3rem;         
  border-radius: 50%;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
  box-shadow: 0 5px 18px rgba(0,0,0,0.15); 
  transition: transform 0.2s;
}

body.dark #toggleDark {
  background: white;
  color: black;
  border: 1px solid rgba(255,255,255,0.16);
}

#toggleDark:hover {
  transform: scale(1.1); 
}

#toggleDark:hover {
  transform:translateY(-3px) scale(1.05);
}

/* En modo oscuro, mantenerlo igual */
body.dark #toggleDark {
  background:white;
  color:black;
  border:1px solid rgba(255,255,255,.16);
}

*,
*::before,
*::after{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--primary:#d97f98;
--primary2:#e79db2;
--text:#262626;
--muted:#8a7278;
--white:#ffffff;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Manrope',sans-serif;
min-height:100vh;
padding:30px 18px;
display:flex;
justify-content:center;
align-items:flex-start;
color:var(--text);

/* FONDO PREMIUM ARREGLADO */
background:
linear-gradient(rgba(255,248,250,.58),rgba(255,248,250,.58)),
url("img/portada.webp");

background-position:center top;
background-size:100% auto;
background-repeat:no-repeat;
background-color:#f4dde3;
background-attachment:fixed;
}

/* FORMULARIO */
form{
width:100%;
max-width:760px;
padding:38px 28px;
border-radius:34px;
background:rgba(255, 255, 255, 0.178);
backdrop-filter:blur(16px);
border:1px solid rgba(255, 255, 255, 0.24);
box-shadow:
0 25px 50px rgba(201,120,140,.12),
0 10px 20px rgba(0,0,0,.04);
animation:fadeUp .8s ease;
}

/* BADGE */
.badge{
display:inline-block;
padding:10px 16px;
border-radius:999px;
background:white;
color:var(--primary);
font-size:.8rem;
font-weight:800;
margin-bottom:18px;
}

/* TITULO */
h2{
text-align:center;
font-size:2.25rem;
font-weight:800;
margin-bottom:28px;
letter-spacing:-1px;
}

/* SUBTITULO */
.section-title{
font-size:1rem;
font-weight:800;
margin-bottom:14px;
color:#8a7077;
}

/* GRID */
.option-grid,
.problem-grid,
.productos{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
margin-bottom:28px;
}

.option-grid label,
.problem-grid label{
display:block;
cursor:pointer;
}

.option-grid input,
.problem-grid input{
display:none;
}

/* OPCIONES */
.option-card,
.problem-card{
min-height:58px;
padding:16px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
border-radius:18px;
background:white;
border:1px solid #f2d8df;
font-weight:700;
transition:.25s ease;
}

.option-grid input:checked + .option-card,
.problem-grid input:checked + .problem-card{
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:white;
border-color:var(--primary);
transform:translateY(-2px);
box-shadow:0 14px 28px rgba(201,120,140,.18);
}

/* SELECT */
select{
width:100%;
padding:16px;
border-radius:18px;
border:1px solid #f2d8df;
background:white;
font-family:'Manrope',sans-serif;
font-size:1rem;
font-weight:700;
outline:none;
margin-bottom:30px;
}

select:focus{
border-color:var(--primary);
box-shadow:0 0 0 4px rgba(201,120,140,.10);
}

/* BOTONES */
.botones{
display:flex;
flex-direction:column;
gap:14px;
}

button,
.btn-secundario{
width:100%;
padding:16px;
border:none;
border-radius:999px;
font-family:'Manrope',sans-serif;
font-size:1rem;
font-weight:800;
cursor:pointer;
text-decoration:none;
text-align:center;
transition:.28s ease;
display:block;
}

button{
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:white;
box-shadow:0 16px 30px rgba(201,120,140,.24);
}

button:hover,
.btn-secundario:hover{
transform:translateY(-4px);
}

.btn-secundario{
background:white;
color:var(--primary);
border:1px solid #f2d8df;
}

.btn-principal{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
  box-shadow:0 16px 30px rgba(201,120,140,.24);

  position:relative;
  overflow:hidden;
}

.btn-principal::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;

  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.5),
    transparent
  );

  transition:0.6s;
}

.btn-principal:hover::before{
  left:100%;
}

/* HELP */
.help-link{
margin-top:28px;
text-align:center;
font-size:.95rem;
line-height:1.6;
}

.help-link a{
color:var(--muted);
font-weight:700;
text-decoration:none;
}

.help-link a:hover{
color:var(--primary);
}

/* RESULTADOS */
#rutinaRecomendada{
margin-top:34px;
display:grid;
gap:22px;
}

#rutinaRecomendada .card{
padding:24px;
border-radius:28px;
background:rgba(255,255,255,.92);
border:1px solid #f4dde3;
box-shadow:0 16px 32px rgba(201,120,140,.08);
animation:fadeUp .45s ease;
}

#rutinaRecomendada h3{
font-size:1.15rem;
font-weight:800;
color:var(--primary);
margin-bottom:12px;
}

#rutinaRecomendada h4{
font-size:1rem;
font-weight:800;
margin:18px 0 12px;
}

#rutinaRecomendada p,
#rutinaRecomendada li{
font-size:.95rem;
line-height:1.65;
color:#555;
}

#rutinaRecomendada ul{
padding-left:18px;
}

/* PRODUCTOS */
.productos{
  grid-template-columns:repeat(3, 1fr);
  gap:17px;
}

.producto{
  text-decoration:none;
  background:rgba(255,255,255,.95);
  border-radius:18px;
  padding:12px;
  text-align:center;
  color:#333;
  box-shadow:0 8px 16px rgba(0,0,0,.04);
  transition:.25s ease;
  min-height:215px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  position:relative;
}

.producto:hover{
  transform:translateY(-5px) scale(1.02);
}

.producto img{
  width:100%;
  height:140px;
  object-fit:contain;
  background:white;
  padding:8px;
  border-radius:12px;
}

.producto span{
  font-size:.8rem;
  font-weight:700;
  line-height:1.3;
  min-height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* BADGES */
.badge-tipo{
  position:absolute;
  top:8px;
  left:8px;
  background:#d57a8a;
  color:white;
  font-size:.6rem;
  padding:3px 6px;
  border-radius:6px;
}

.badge-rating{
  position:absolute;
  top:8px;
  right:8px;
  font-size:.65rem;
  background:white;
  padding:3px 6px;
  border-radius:6px;
  box-shadow:0 3px 6px rgba(0,0,0,.1);
}

/* ANIMACION */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(22px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* ===== CONTENEDOR IA ===== */
.explicacion{
  margin-top:26px;
  padding:22px;
  border-radius:24px;

  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(16px);

  border:1px solid rgba(255,255,255,0.6);

  box-shadow:
    0 18px 35px rgba(0,0,0,0.05),
    0 8px 18px rgba(213,122,138,0.08);

  animation:fadeUp .4s ease;
}

/* LOADING EFECTO APP */
.shimmer{
  height:12px;
  border-radius:8px;
  margin:10px 0;

  background:linear-gradient(
    90deg,
    rgba(230,230,230,0.4) 25%,
    rgba(255,255,255,0.8) 50%,
    rgba(230,230,230,0.4) 75%
  );

  background-size:200% 100%;
  animation:shine 1.2s infinite;
}
@keyframes shine{
  from{background-position:200% 0}
  to{background-position:-200% 0}
}

.explicacion.loading{
  opacity:0.85;
}

/* TITULO */
.explicacion h3{
  margin-bottom:14px;
  font-size:1.1rem;
  font-weight:900;
  color:var(--primary);
}

/* TEXTO BASE */
.ia-texto{
  display:flex;
  flex-direction:column;
  gap:14px;
  font-size:.92rem;
  line-height:1.6;
}

/* PASOS TIPO APP */
.paso{
  display:flex;
  align-items:center;
  gap:10px;
  background:white;
  padding:10px 14px;
  border-radius:14px;
  margin-bottom:8px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.paso span{
  background:linear-gradient(135deg,#d97f98,#e79db2);
  color:white;
  font-weight:800;
  width:24px;
  height:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  font-size:.75rem;
}


/* BLOQUES (💧🧴🌿) */
.ia-texto br + br{
  display:none;
}

/* ESTILO BLOQUES */
.ia-texto{
  position:relative;
}

/* SEPARACION VISUAL */
.ia-texto::before{
  content:"";
  display:block;
  height:1px;
  width:100%;
  background:rgba(0,0,0,0.05);
  margin:6px 0 12px;
}

/* LISTAS */
.ia-texto li{
  margin-left:18px;
  margin-bottom:6px;
}

.ia-texto ul{
  padding-left:18px;
  margin-top:6px;
}

.ia-texto h4{
  margin-top:10px;
  font-size:.95rem;
  color:#d97f98;
}

/* HOVER */
.explicacion:hover{
  transform:translateY(-4px);
  transition:.3s;
}

/* RESPONSIVE */
@media(max-width:700px){

body{
padding:20px 12px;
background-size:cover;
background-position:center;
background-attachment:scroll;
}

form{
padding:28px 18px;
border-radius:24px;
}

h2{
font-size:1.85rem;
}

.option-grid,
.problem-grid,
.productos{
grid-template-columns:1fr;
}

.producto{
  min-height:240px;
  border-radius:20px;
}

.producto-img{
  height:150px;
  padding:10px;
  background:#fafafa;
}

.producto-info{
min-height:85px;
}
}
</style>
</head>

<body>

  <div class="dark-toggle">
  <button id="toggleDark">🌙</button>
</div>

<form id="formSkincare">

<div class="badge">✨ TEST PERSONALIZADO</div>

<h2>Descubre tu rutina ideal</h2>

<div class="section-title">Tipo de piel</div>

<div class="option-grid">
<label><input type="radio" name="tipoPiel" value="seca"><div class="option-card">Seca</div></label>
<label><input type="radio" name="tipoPiel" value="mixta"><div class="option-card">Mixta</div></label>
<label><input type="radio" name="tipoPiel" value="grasa"><div class="option-card">Grasa</div></label>
<label><input type="radio" name="tipoPiel" value="sensible"><div class="option-card">Sensible</div></label>
<label><input type="radio" name="tipoPiel" value="normal"><div class="option-card">Normal</div></label>
<label><input type="radio" name="tipoPiel" value="madura"><div class="option-card">Madura</div></label>
</div>
<div class="section-title">Problemas principales</div>

<div class="problem-grid">
<label><input type="checkbox" name="problemas[]" value="acne"><div class="problem-card">Acné</div></label>
<label><input type="checkbox" name="problemas[]" value="rojeces"><div class="problem-card">Rojeces</div></label>
<label><input type="checkbox" name="problemas[]" value="deshidratacion"><div class="problem-card">Deshidratación</div></label>
<label><input type="checkbox" name="problemas[]" value="arrugas"><div class="problem-card">Arrugas</div></label>
<label><input type="checkbox" name="problemas[]" value="manchas"><div class="problem-card">Manchas</div></label>
<label><input type="checkbox" name="problemas[]" value="sensibilidad"><div class="problem-card">Sensibilidad</div></label>
<label><input type="checkbox" name="problemas[]" value="poros"><div class="problem-card">Poros</div></label>
<label><input type="checkbox" name="problemas[]" value="congestion"><div class="problem-card">Congestión</div></label>
<label><input type="checkbox" name="problemas[]" value="luminosidad"><div class="problem-card">Apagada</div></label>
<label><input type="checkbox" name="problemas[]" value="ninguno"><div class="problem-card">Ninguno</div></label>
</div>

<div class="section-title">Presupuesto</div>

<select id="presupuesto" name="presupuesto" required>
<option value="" disabled selected>Selecciona una opción</option>
<option value="Bajo">Bajo</option>
<option value="Medio">Medio</option>
<option value="Alto">Alto</option>
</select>

<div class="botones">
<button type="submit" class="btn-principal">Ver recomendaciones</button>
<button type="button" onclick="guardarDatos()">Guardar rutina</button>
<a href="misRutinas.html" class="btn-secundario">Mis rutinas</a>
<a href="estadisticas.html" class="btn-secundario">🔥 Rutinas populares</a>
</div>

<div class="help-link">
<a href="formulario_ayuda.html">¿No sabes tu tipo de piel o problemas? Descúbrelo aquí.</a>
</div>

<div id="rutinaRecomendada"></div>

</form>

<script src="productos.js"></script>
<script src="app.js"></script>

<script>
const btnDark = document.getElementById("toggleDark");

btnDark.addEventListener("click", () => {
  document.body.classList.toggle("dark");

  if(document.body.classList.contains("dark")){
    localStorage.setItem("modo","oscuro");
  } else {
    localStorage.setItem("modo","claro");
  }
});

// mantener modo al recargar
if(localStorage.getItem("modo") === "oscuro"){
  document.body.classList.add("dark");
}
</script>

</body>
</html>
