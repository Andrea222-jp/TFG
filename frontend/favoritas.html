<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutinas Favoritas - SkinMatch</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ===== MODO OSCURO ===== */
body.dark {
  background:
    url("img/portada2.webp") center/cover no-repeat fixed;
  color:white;
}

body.dark .wrapper{
  background:rgba(28,28,28,.15);
}

body.dark h1,
body.dark .sub{
  color:white;
}

body.dark .badge{
  background:rgba(255,255,255,.08);
  color:#ffb6c7;
}

/* NO CAMBIAR BOTONES */

/* BOTÓN LUNA */
.dark-toggle{
  position:fixed;
  top:20px;
  right:20px;
  z-index:1000;
}

#toggleDark{
  display:flex;
  align-items:center;
  justify-content:center;
  width:50px;
  height:50px;
  border-radius:50%;
  background:white;
  color:black;
  font-size:1.3rem;
  border:none;
  cursor:pointer;
  box-shadow:0 5px 18px rgba(0,0,0,.15);
  transition:.2s;
}

#toggleDark:hover{
  transform:scale(1.1);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--primary:#d57a8a;
--primary-dark:#bf6273;
--text:#2a2a2a;
--soft:#7a6d72;
}

body{
font-family:'Manrope',sans-serif;
min-height:100vh;
padding:28px 16px;
background:
linear-gradient(rgba(255, 248, 246, 0.527),rgba(255, 248, 246, 0.486)),
url("img/portada2.webp") center/cover no-repeat fixed;
color:var(--text);
}

/* CONTENEDOR */
.wrapper{
max-width:1050px;
margin:auto;
}

/* HEADER */
.top{
text-align:center;
margin-bottom:24px;
}

.badge{
display:inline-block;
padding:8px 14px;
border-radius:999px;
background:white;
color:var(--primary);
font-size:.72rem;
font-weight:800;
box-shadow:0 8px 18px rgba(213,122,138,.14);
margin-bottom:14px;
}

h1{
font-size:2rem;
font-weight:800;
letter-spacing:-1px;
margin-bottom:6px;
}

.sub{
font-size:.95rem;
color:var(--soft);
}

/* BOTONES */
.actions{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:24px 0 30px;
}

.btn{
height:56px;
padding:0 22px;

border-radius:999px;

font-size:.88rem;
font-weight:800;
text-decoration:none;

transition:.25s ease;

display:flex;
align-items:center;
justify-content:center;

gap:10px;
}

.btn-primary{
background:linear-gradient(135deg,#d57a8a,#e596a6);
color:white;
box-shadow:0 10px 18px rgba(213,122,138,.22);
}

.btn-secondary{
background:rgba(255,255,255,.82);
color:var(--primary);
border:1px solid rgba(255,255,255,.8);
backdrop-filter:blur(10px);
}

/* BOTÓN CREAR */

.btn-crear{
background:linear-gradient(135deg,#ff8aa5,#ffb6c7);
color:white;

font-weight:900;
letter-spacing:.3px;

box-shadow:
0 12px 25px rgba(255,138,165,.35),
0 4px 10px rgba(0,0,0,.05);

position:relative;
overflow:hidden;
}

/* BRILLO */

.btn-crear::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.5),
transparent
);

transition:.6s;
}

.btn-crear:hover::before{
left:100%;
}

.btn-crear:hover{
transform:translateY(-4px) scale(1.04);

box-shadow:
0 18px 35px rgba(255,138,165,.45),
0 8px 16px rgba(0,0,0,.08);
}

/* PERFIL */

.perfil-btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.perfil-btn img{
width:32px;
height:32px;
border-radius:50%;
object-fit:cover;
transition:.25s ease;

border:2px solid rgba(213,122,138,.18);

box-shadow:0 4px 10px rgba(0,0,0,.06);
}

.perfil-btn span{
font-weight:800;
}

.btn:hover{
transform:translateY(-3px);
}

.perfil-btn:hover img{
transform:scale(1.08);
}

/* FAVORITAS */
#contenedorFavoritas{
display:grid;
gap:18px;
}

/* CARD */
.card{
background:rgba(255,255,255,.76);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.72);
border-radius:24px;
padding:20px;
box-shadow:
0 10px 24px rgba(0,0,0,.05),
0 8px 16px rgba(213,122,138,.06);
}

/* INFO */
.info{
font-size:.95rem;
line-height:1.65;
margin-bottom:6px;
color:#5a454d;
}

.info strong{
color:#222;
}

/* TITULOS */
.card h3{
font-size:1.05rem;
margin:16px 0 12px;
color:var(--primary);
font-weight:800;
}

/* PRODUCTOS */
.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:12px;
margin-bottom:14px;
}

.producto{
text-decoration:none;
background:rgba(255,255,255,.92);
border-radius:18px;
padding:10px;
text-align:center;
color:#333;
box-shadow:0 8px 16px rgba(0,0,0,.04);
transition:.2s ease;
min-height:205px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.producto:hover{
transform:translateY(-4px);
}

.producto img{
width:100%;
height:115px;
object-fit:contain;
margin-bottom:8px;
}

.producto span{
font-size:.78rem;
font-weight:700;
line-height:1.3;
min-height:42px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* VACÍO */
.empty{
text-align:center;
padding:36px 20px;
border-radius:22px;
background:rgba(255,255,255,.78);
color:#7c6c72;
font-size:.95rem;
}

/* MOBILE */
@media(max-width:768px){

h1{
font-size:1.7rem;
}

.actions{
flex-direction:column;
}

.btn{
width:100%;
}

.productos{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:500px){

body{
padding:20px 12px;
}

.card{
padding:18px 14px;
}

.producto{
min-height:190px;
}

.producto img{
height:100px;
}

.producto span{
font-size:.74rem;
}

}
</style>
</head>

<body>

<div class="dark-toggle">
  <button id="toggleDark">🌙</button>
</div>

<div class="wrapper">

<div class="top">
<div class="badge">❤ FAVORITAS</div>
<h1>Mis rutinas favoritas</h1>
<div class="sub">Tus rutinas guardadas más especiales</div>
</div>

<div class="actions">

<a href="misRutinas.html" class="btn btn-primary">
Mis rutinas
</a>

<a href="formulario.html" class="btn btn-crear">
✨ Nueva rutina
</a>

<a href="perfil.html" class="btn btn-secondary perfil-btn">

<img src="img/perfil.png" alt="Perfil">

<span>Mi perfil</span>

</a>

</div>

<div id="contenedorFavoritas"></div>

</div>

<script src="productos.js"></script>
<script src="favoritas.js"></script>

<script>
const btnDark = document.getElementById("toggleDark");

btnDark.addEventListener("click", () => {
  document.body.classList.toggle("dark");

  if(document.body.classList.contains("dark")){
    localStorage.setItem("modo","oscuro");
  } else {
    localStorage.setItem("modo","claro");
  }
});

if(localStorage.getItem("modo") === "oscuro"){
  document.body.classList.add("dark");
}
</script>

</body>
</html>
