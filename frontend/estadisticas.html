<!-- ===========================
ESTADISTICAS.HTML PREMIUM
=========================== -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkinMatch - Estadísticas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg-overlay:rgba(255,248,250,.72);

--text:#2b2b2b;
--muted:#7b6b70;

--card:rgba(255,255,255,.84);
--card-border:rgba(255,255,255,.7);

--badge-bg:white;
--badge-text:#d97f98;

--kpi-text:#6e6267;
}

.dark{
--bg-overlay:rgba(10,10,10,.72);

--text:#f5f5f5;
--muted:#d1c4c8;

--card:rgba(30,30,30,.72);
--card-border:rgba(255,255,255,.08);

--badge-bg:rgba(255,255,255,.08);
--badge-text:#ffb6c7;

--kpi-text:#d6c6cb;
}

body{
font-family:'Manrope',sans-serif;
min-height:100vh;
padding:40px 20px;
color:var(--text);

background:
linear-gradient(var(--bg-overlay),var(--bg-overlay)),
url("img/portada2.webp");

background-size:cover;
background-position:center;
background-attachment:fixed;

transition:.3s;
}

/* CONTENEDOR */
.wrap{
max-width:1250px;
margin:auto;
}

/* HEADER */
.top{
text-align:center;
margin-bottom:35px;
animation:fadeUp .7s ease;
}

.badge{
display:inline-block;
padding:10px 16px;
border-radius:999px;
background:var(--badge-bg);
color:var(--badge-text);
backdrop-filter:blur(12px);
font-size:.8rem;
font-weight:800;
margin-bottom:18px;
box-shadow:0 10px 25px rgba(217,127,152,.08);
}

h1{
font-size:2.4rem;
font-weight:800;
letter-spacing:-1px;
margin-bottom:10px;
}

.top p{
color:var(--muted);
font-size:1rem;
}

/* KPIS */
.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:28px;
}

.kpi{
background:var(--card);
backdrop-filter:blur(14px);
border:1px solid var(--card-border);
border-radius:26px;
padding:24px;
box-shadow:0 20px 35px rgba(217,127,152,.08);
text-align:center;
animation:fadeUp .8s ease;
}

.kpi-num{
font-size:2rem;
font-weight:800;
color:#d97f98;
margin-bottom:8px;
}

.kpi-text{
font-size:.95rem;
font-weight:700;
color:var(--kpi-text);
}

/* GRAFICAS */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
}

.card{
background:var(--card);
backdrop-filter:blur(14px);
border:1px solid var(--card-border);
border-radius:28px;
padding:24px;
box-shadow:0 20px 35px rgba(217,127,152,.08);
min-height:430px;
animation:fadeUp .9s ease;
transition:.28s ease;
}

.card:hover{
transform:translateY(-6px);
}

.card h3{
font-size:1.05rem;
font-weight:800;
margin-bottom:18px;
color:#d97f98;
}

.chart-box{
position:relative;
height:330px;
}

/* BOTON */
.volver{
display:inline-block;
margin-top:34px;
padding:16px 28px;
border-radius:999px;
text-decoration:none;
font-weight:800;
background:linear-gradient(135deg,#d97f98,#eca5ba);
color:white;
box-shadow:0 16px 28px rgba(217,127,152,.22);
transition:.28s ease;
}

.volver:hover{
transform:translateY(-4px);
}

/* ANIMACION */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* DARK BUTTON */
.dark-toggle{
position:fixed;
top:20px;
right:20px;
z-index:999;
}

#toggleDark{
width:54px;
height:54px;
border:none;
border-radius:50%;

background:rgba(255,255,255,.85);
backdrop-filter:blur(12px);

font-size:1.2rem;
cursor:pointer;

box-shadow:0 10px 25px rgba(0,0,0,.08);

transition:.3s;
}

#toggleDark:hover{
transform:translateY(-3px) scale(1.05);
}

.dark #toggleDark{
background:rgba(255,255,255,.08);
color:white;
border:1px solid rgba(255,255,255,.08);
}

/* RESPONSIVE */
@media(max-width:980px){

.stats{
grid-template-columns:repeat(2,1fr);
}

.grid{
grid-template-columns:1fr;
}

}

@media(max-width:600px){

body{
padding:22px 14px;
background-attachment:scroll;
}

h1{
font-size:1.8rem;
}

.stats{
grid-template-columns:1fr;
}

.card{
padding:18px;
min-height:390px;
}

.chart-box{
height:290px;
}

}
</style>
</head>

<body>

    <div class="dark-toggle">
<button id="toggleDark">🌙</button>
</div>

<div class="wrap">

<div class="top">
<div class="badge">DASHBOARD SKINMATCH</div>
<h1>Estadísticas de usuarios</h1>
<p>Tendencias reales según formularios completados</p>
</div>

<!-- KPIS -->
<div class="stats">

<div class="kpi">
<div class="kpi-num" id="totalUsuarios">0</div>
<div class="kpi-text">Usuarios analizados</div>
</div>

<div class="kpi">
<div class="kpi-num" id="topPiel">-</div>
<div class="kpi-text">Tipo de piel top</div>
</div>

<div class="kpi">
<div class="kpi-num" id="topProblema">-</div>
<div class="kpi-text">Problema top</div>
</div>

<div class="kpi">
<div class="kpi-num" id="totalProblemas">0</div>
<div class="kpi-text">Problemas detectados</div>
</div>

</div>

<!-- GRAFICAS -->
<div class="grid">

<div class="card">
<h3>✨ Tipos de piel</h3>
<div class="chart-box">
<canvas id="graficaPiel"></canvas>
</div>
</div>

<div class="card">
<h3>Problemas más comunes</h3>
<div class="chart-box">
<canvas id="graficaProblemas"></canvas>
</div>
</div>

</div>

<div style="text-align:center;">
<a href="index.html" class="volver">← Volver</a>
</div>

</div>

<script src="estadisticas.js"></script>
<script src="darkmode.js"></script>
</body>
</html>
