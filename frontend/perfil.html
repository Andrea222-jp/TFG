<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Perfil - SkinMatch</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ===== MODO OSCURO ===== */
body.dark{
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url("img/portada2.webp") center/cover no-repeat fixed;
}

body.dark .card{
background:rgba(28,28,28,.35);
border:1px solid rgba(255,255,255,.08);
box-shadow:
0 20px 40px rgba(0,0,0,.35),
0 8px 18px rgba(255,255,255,.03);
}

body.dark h2,
body.dark .sub,
body.dark .email-box,
body.dark input{
color:white;
}

body.dark .email-box,
body.dark input{
background:#2a2a2a;
border:1px solid #3a3a3a;
}

body.dark .badge{
background:rgba(255,255,255,.08);
color:#ffb6c7;
}

body.dark .btn-light{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.14);
color:white;
}

body.dark .btn-light:hover{
background:rgba(255,255,255,.14);
}

body.dark .links a{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.14);
color:white;
}

body.dark .links a:hover{
background:rgba(255,255,255,.14);
}

/* BOTÓN LUNA */
.dark-toggle{
position:fixed;
top:20px;
right:20px;
z-index:1000;
}

#toggleDark{
display:flex;
align-items:center;
justify-content:center;
width:50px;
height:50px;
border-radius:50%;
background:white;
color:black;
font-size:1.3rem;
border:none;
cursor:pointer;
box-shadow:0 5px 18px rgba(0,0,0,.15);
transition:.2s;
}

#toggleDark:hover{
transform:scale(1.1);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--primary:#d57a8a;
--primary-dark:#bf6273;
--text:#2a2a2a;
--soft:#7a6d72;
}

body{
font-family:'Manrope',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
linear-gradient(rgba(255,248,246,.52),rgba(255,248,246,.48)),
url("img/portada2.webp") center/cover no-repeat fixed;
}

/* CARD */
.card{
width:100%;
max-width:430px;
background:rgba(255,255,255,.78);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,.75);
border-radius:28px;
padding:34px 28px;
box-shadow:
0 15px 35px rgba(0,0,0,.06),
0 10px 22px rgba(213,122,138,.10);
text-align:center;
animation:fadeUp .7s ease;
}

/* FOTO PERFIL */
.avatar-wrap{
position:relative;
width:110px;
height:110px;
margin:0 auto 18px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
object-position:center;
display:block;
border:4px solid white;
box-shadow:0 12px 28px rgba(213,122,138,.18);
transition:.25s ease;
background:#fff;
}

.avatar-wrap:hover .avatar{
transform:scale(1.03);
}

.overlay{
position:absolute;
inset:0;
border-radius:50%;
background:rgba(0,0,0,.32);
color:white;
font-size:.72rem;
font-weight:800;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
opacity:0;
transition:.25s ease;
padding:12px;
}

.avatar-wrap:hover .overlay{
opacity:1;
}

/* TITULOS */
.badge{
display:inline-block;
padding:8px 14px;
border-radius:999px;
background:white;
color:var(--primary);
font-size:.75rem;
font-weight:800;
margin-bottom:16px;
box-shadow:0 8px 18px rgba(213,122,138,.14);
}

h2{
font-size:2rem;
font-weight:800;
color:#222;
margin-bottom:10px;
letter-spacing:-1px;
}

.sub{
font-size:.95rem;
color:var(--soft);
margin-bottom:24px;
}

/* EMAIL */
.email-box{
padding:14px 16px;
border-radius:18px;
background:white;
font-weight:700;
color:#5a454d;
margin-bottom:18px;
border:1px solid #f4dde3;
word-break:break-word;
text-align:left;
}

/* INPUT */
.input-group{
position:relative;
margin-bottom:16px;
}

input{
width:100%;
padding:15px 50px 15px 16px;
border-radius:18px;
border:1px solid #edd6dc;
font-family:'Manrope',sans-serif;
font-size:.95rem;
font-weight:700;
outline:none;
transition:.25s ease;
}

input:focus{
border-color:var(--primary);
box-shadow:0 0 0 4px rgba(213,122,138,.12);
}

/* OJO */
.ojo{
position:absolute;
right:16px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.ojo img{
width:22px;
height:22px;
opacity:.8;
transition:.2s ease;
}

.ojo:hover img{
opacity:1;
transform:scale(1.08);
}

/* BOTONES */
.botones{
display:flex;
flex-direction:column;
gap:12px;
margin-top:8px;
}

button{
border:none;
padding:15px;
border-radius:999px;
font-family:'Manrope',sans-serif;
font-size:.95rem;
font-weight:800;
cursor:pointer;
transition:.25s ease;
}

.btn-main{
background:linear-gradient(135deg,#d57a8a,#e596a6);
color:white;
box-shadow:0 12px 24px rgba(213,122,138,.18);
}

.btn-main:hover{
transform:translateY(-3px);
}

.btn-light{
background:white;
color:var(--primary);
border:1px solid #f0d8de;
}

.btn-light:hover{
transform:translateY(-3px);
background:#fff8fa;
}

.btn-logout{
background:#fff0f3;
color:#c45f72;
}

.btn-logout:hover{
transform:translateY(-3px);
background:#ffe4ea;
}

/* LINKS */
.links{
margin-top:18px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.links a{
flex:1;
min-width:120px;
text-align:center;
text-decoration:none;
padding:12px;
border-radius:999px;
background:rgba(255,255,255,.82);
color:var(--primary);
font-size:.85rem;
font-weight:800;
border:1px solid rgba(255,255,255,.8);
transition:.25s ease;
}

.links a:hover{
transform:translateY(-3px);
}

/* ANIMACION */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(18px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */
@media(max-width:500px){

.card{
padding:28px 18px;
border-radius:24px;
}

h2{
font-size:1.7rem;
}

.links{
flex-direction:column;
}

.avatar-wrap,
.avatar{
width:90px;
height:90px;
}

}
</style>
</head>

<body>

<div class="dark-toggle">
  <button id="toggleDark">🌙</button>
</div>

<div class="card">

<!-- FOTO PERFIL -->
<label for="subirFoto" class="avatar-wrap">

<img
src="img/perfil.jpg"
class="avatar"
id="fotoPerfil"
alt="Foto de perfil">

<div class="overlay">
Cambiar foto
</div>

</label>

<input type="file" id="subirFoto" accept="image/*" style="display:none;">

<div class="badge">MI PERFIL</div>

<h2>Mi perfil</h2>
<div class="sub">Gestiona tu cuenta SkinMatch</div>

<div class="email-box" id="emailUsuario"></div>

<div class="input-group">
<input type="password" id="nuevaPass" placeholder="Nueva contraseña">

<span class="ojo" onclick="togglePasswordPerfil()">
<img id="iconoOjo" src="img/ojo-abierto.png">
</span>
</div>

<div class="botones">
<button class="btn-main" onclick="cambiarPass()">Cambiar contraseña</button>
<button class="btn-light" onclick="window.location.href='misRutinas.html'">Mis rutinas</button>
<button class="btn-logout" onclick="logout()">Cerrar sesión</button>
</div>

<div class="links">
<a href="favoritas.html">❤ Favoritas</a>
<a href="formulario.html">✨ Nueva rutina</a>
</div>

</div>

<script>
const email = localStorage.getItem("sesion");

document.getElementById("emailUsuario").innerText =
email ? "📧 " + email : "📧 Usuario no identificado";

/* FOTO PERFIL */
const inputFoto = document.getElementById("subirFoto");
const fotoPerfil = document.getElementById("fotoPerfil");

const fotoGuardada = localStorage.getItem("fotoPerfil");

if(fotoGuardada){
fotoPerfil.src = fotoGuardada;
}

inputFoto.addEventListener("change", function(){

const archivo = this.files[0];

if(!archivo) return;

if(!archivo.type.startsWith("image/")){
alert("Selecciona una imagen");
return;
}

const lector = new FileReader();

lector.onload = function(e){
fotoPerfil.src = e.target.result;
localStorage.setItem("fotoPerfil", e.target.result);
};

lector.readAsDataURL(archivo);

});

/* OJO */
function togglePasswordPerfil(){

const input = document.getElementById("nuevaPass");
const icono = document.getElementById("iconoOjo");

if(input.type === "password"){
input.type = "text";
icono.src = "img/ojo-abierto.png";
}else{
input.type = "password";
icono.src = "img/ojo.png";
}

}

/* CAMBIAR PASS */
function cambiarPass(){

const nuevaPassword = document.getElementById("nuevaPass").value.trim();

if(!nuevaPassword){
alert("Escribe una contraseña");
return;
}

fetch("http://localhost:3000/cambiar-password",{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
nuevaPassword
})
})
.then(res => res.json())
.then(() => {
alert("Contraseña actualizada");
document.getElementById("nuevaPass").value = "";
});

}

/* LOGOUT */
function logout(){
localStorage.removeItem("sesion");
window.location.href = "index.html";
}
</script>

<script>
const btnDark = document.getElementById("toggleDark");

btnDark.addEventListener("click", () => {

document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){
localStorage.setItem("modo","oscuro");
}else{
localStorage.setItem("modo","claro");
}

});

if(localStorage.getItem("modo") === "oscuro"){
document.body.classList.add("dark");
}
</script>

</body>
</html>
