<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkinMatch - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--primary:#c9788c;
--hover:#b8677a;
--text:#262626;
}

.dark{
--text:#f5f5f5;
}

body{
font-family:'Manrope',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
position:relative;

background:
radial-gradient(circle at top right,#ffeef2 0%, transparent 35%),
radial-gradient(circle at bottom left,#fff1f4 0%, transparent 35%),
#fffaf8;

transition:.3s;
}

body.dark{
background:
radial-gradient(circle at top right,#3a1f28 0%, transparent 35%),
radial-gradient(circle at bottom left,#1a1a1a 0%, transparent 35%),
#121212;
}

.lluvia{
position:fixed;
inset:0;
overflow:hidden;
pointer-events:none;
z-index:0;
}

.icono{
position:absolute;
top:-70px;
animation:caer linear infinite;
opacity:.95;
}

.icono img{
display:block;
width:100%;
height:auto;
filter:drop-shadow(0 0 12px rgba(255,182,193,.55));
}

@keyframes caer{
0%{transform:translateY(-70px) rotate(0deg);}
50%{transform:translateY(55vh) translateX(20px) rotate(8deg);}
100%{transform:translateY(115vh) translateX(-15px) rotate(-8deg);}
}

.scene{
width:100%;
max-width:430px;
perspective:1400px;
z-index:2;
position:relative;
}

.card{
width:100%;
min-height:560px;
position:relative;
transform-style:preserve-3d;
transition:transform .9s cubic-bezier(.22,.61,.36,1);
}

.card.flip{
transform:rotateY(180deg);
}

.face{
position:absolute;
inset:0;
backface-visibility:hidden;
border-radius:30px;
background:rgba(255,255,255,.78);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.8);
box-shadow:
0 25px 50px rgba(201,120,140,.14),
0 10px 20px rgba(0,0,0,.04);
padding:38px 30px;
}

.dark .face{
background:rgba(28,28,28,.78);
border:1px solid rgba(255,255,255,.06);
}

.dark .badge{
background:rgba(255,255,255,.08);
color:#ffb6c7;
}

.dark .logo{
box-shadow:0 15px 30px rgba(0,0,0,.35);
}

.front{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.logo{
width:150px;
margin-bottom:20px;
border-radius:24px;
box-shadow:0 15px 30px rgba(0,0,0,.08);
}

.front h1{
font-size:2.4rem;
font-weight:800;
margin-bottom:14px;
color:#222;
line-height:1.1;
}

.front h1 span{
color:var(--primary);
}

.front p{
font-size:1rem;
line-height:1.8;
color:#666;
max-width:300px;
margin-bottom:28px;
}

.enter-btn{
padding:16px 34px;
border:none;
border-radius:999px;
background:linear-gradient(135deg,var(--primary),#e191a4);
color:white;
font-weight:800;
font-size:1rem;
cursor:pointer;
box-shadow:0 16px 30px rgba(201,120,140,.28);
transition:.3s;
}

.enter-btn:hover{
transform:translateY(-4px);
}

.back{
transform:rotateY(180deg);
}

.badge{
display:inline-block;
padding:9px 16px;
border-radius:999px;
background:white;
color:var(--primary);
font-size:.78rem;
font-weight:800;
margin-bottom:16px;
box-shadow:0 10px 25px rgba(201,120,140,.12);
}

h2{
font-size:2rem;
font-weight:800;
margin-bottom:24px;
color:#222;
}

.dark h2,
.dark .front h1{
color:white;
}

.form-group{
position:relative;
margin-bottom:15px;
}

input{
width:100%;
padding:16px 18px;
border-radius:18px;
border:1px solid #f2d8df;
background:white;
font-family:'Manrope',sans-serif;
font-size:1rem;
font-weight:600;
outline:none;
transition:.25s;
}

input:focus{
border-color:var(--primary);
box-shadow:0 0 0 4px rgba(201,120,140,.12);
}

.dark input{
background:#2a2a2a;
border-color:#3a3a3a;
color:white;
}

.dark input::placeholder{
color:#bdbdbd;
}

.password{
padding-right:52px;
}

.ojo{
position:absolute;
right:16px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

.ojo img{
width:22px;
opacity:.75;
transition:.2s;
}

button{
width:100%;
border:none;
padding:16px;
border-radius:999px;
background:linear-gradient(135deg,var(--primary),#e191a4);
color:white;
font-weight:800;
font-size:1rem;
cursor:pointer;
margin-top:8px;
transition:.3s;
}

button:hover{
transform:translateY(-4px);
}

.toggle,
.recuperar-link,
.back-link{
text-align:center;
margin-top:16px;
font-size:.95rem;
font-weight:700;
cursor:pointer;
color:#8a7b80;
}

.toggle:hover,
.recuperar-link:hover,
.back-link:hover{
color:var(--primary);
}

.dark .toggle,
.dark .recuperar-link,
.dark .back-link,
.dark .front p{
color:#d1d1d1;
}

.recuperar-box{
display:none;
margin-top:12px;
}

/* DARK BUTTON */
.dark-toggle{
position:fixed;
top:20px;
right:20px;
z-index:999;
}

#toggleDark{
width:54px;
height:54px;
border:none;
border-radius:50%;

background:rgba(255,255,255,.85);
backdrop-filter:blur(12px);

font-size:1.2rem;
cursor:pointer;

box-shadow:0 10px 25px rgba(0,0,0,.08);

transition:.3s;
}

#toggleDark:hover{
transform:translateY(-3px) scale(1.05);
}

.dark #toggleDark{
background:rgba(255,255,255,.08);
color:white;
border:1px solid rgba(255,255,255,.08);
}

@media(max-width:500px){

.card{min-height:600px;}
.face{padding:30px 22px;border-radius:24px;}
.front h1{font-size:2rem;}
h2{font-size:1.7rem;}
.logo{width:130px;}

}
</style>
</head>

<body>

<div class="dark-toggle">
<button id="toggleDark">🌙</button>
</div>

<div class="lluvia"></div>

<div class="scene">
<div class="card" id="card">

<div class="face front">

<img src="img/SkinMatch.png" class="logo">

<h1>Bienvenida a <span>SkinMatch</span></h1>

<p>
Rutinas inteligentes para tu piel con recomendaciones personalizadas en segundos.
</p>

<button class="enter-btn" onclick="flipCard()">Entrar</button>

</div>

<div class="face back">

<div class="badge">✨ ACCESO</div>

<h2 id="titulo">Inicia sesión</h2>

<div class="form-group">
<input type="text" id="nombre" placeholder="Tu nombre" style="display:none;">
</div>

<div class="form-group">
<input type="email" id="email" placeholder="Correo electrónico">
</div>

<div class="form-group">
<input type="password" id="password" class="password" placeholder="Contraseña">

<span class="ojo" onclick="togglePassword()">
<img id="iconoOjo" src="img/ojo-abierto.png">
</span>

</div>

<button onclick="accion()" id="btnAccion">Entrar</button>

<div class="recuperar-link" onclick="mostrarRecuperar()">
¿Olvidaste tu contraseña?
</div>

<div id="recuperarBox" class="recuperar-box">
<input type="email" id="emailRecuperar" placeholder="Tu email">
<button onclick="recuperarPass()">Enviar nueva contraseña</button>
</div>

<div class="toggle" onclick="cambiarModo()" id="textoModo">
¿No tienes cuenta? Regístrate
</div>

<div class="back-link" onclick="flipCard()">
← Volver
</div>

</div>

</div>
</div>

<script>
let modoRegistro=false;

function flipCard(){
document.getElementById("card").classList.toggle("flip");
}

function cambiarModo(){
modoRegistro=!modoRegistro;

document.getElementById("titulo").innerText =
modoRegistro ? "Crea tu cuenta" : "Inicia sesión";

document.getElementById("nombre").style.display =
modoRegistro ? "block" : "none";

document.getElementById("btnAccion").innerText =
modoRegistro ? "Registrarme" : "Entrar";

document.getElementById("textoModo").innerText =
modoRegistro
? "¿Ya tienes cuenta? Inicia sesión"
: "¿No tienes cuenta? Regístrate";
}

function togglePassword(){
const input=document.getElementById("password");
const icon=document.getElementById("iconoOjo");

if(input.type==="password"){
input.type="text";
icon.src="img/ojo-abierto.png";
}else{
input.type="password";
icon.src="img/ojo.png";
}
}

function mostrarRecuperar(){
document.getElementById("recuperarBox").style.display="block";
}

/* RECUPERAR CONTRASEÑA REAL */
function recuperarPass(){

const email=document.getElementById("emailRecuperar").value.trim();

if(!email){
alert("Introduce tu email");
return;
}

fetch("http://localhost:3000/recuperar",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email})
})
.then(res=>res.json())
.then(data=>{
alert(data.mensaje || data.error);
})
.catch(()=>{
alert("Error enviando correo");
});

}

/* LOGIN Y REGISTRO REAL */
function accion(){

const nombre=document.getElementById("nombre").value.trim();
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();

if(!email || !password){
alert("Completa los campos");
return;
}

if(modoRegistro){

fetch("http://localhost:3000/registro",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
nombre,
email,
password
})
})
.then(res=>res.json())
.then(data=>{
alert(data.mensaje || data.error);
})
.catch(()=>{
alert("Error al registrar");
});

}else{

fetch("http://localhost:3000/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
password
})
})
.then(res=>res.json())
.then(data=>{

if(data.usuario){
localStorage.setItem("sesion",email);
window.location.href="inicioFormulario.html";
}else{
alert(data.error || "Credenciales incorrectas");
}

})
.catch(()=>{
alert("Error al iniciar sesión");
});

}

}

/* LLUVIA */
const lluvia=document.querySelector(".lluvia");

const imagenes=[
"img/png0.webp",
"img/png1.webp",
"img/centella2.png",
"img/centella3.webp"
];

for(let i=0;i<28;i++){

const span=document.createElement("span");
span.classList.add("icono");

const img=document.createElement("img");
img.src=imagenes[Math.floor(Math.random()*imagenes.length)];

img.style.width=(Math.random()*18+34)+"px";

span.appendChild(img);
span.style.left=Math.random()*100+"vw";
span.style.animationDuration=(Math.random()*5+6)+"s";
span.style.animationDelay=Math.random()*5+"s";

lluvia.appendChild(span);
}
</script>

<script src="darkmode.js"></script>

</body>
</html>
