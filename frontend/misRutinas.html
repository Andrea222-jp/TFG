<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Rutinas - SkinMatch</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ===== MODO OSCURO ===== */
body.dark {
  background:
    url("img/portada2.webp") center/cover no-repeat fixed;
  color: white;
}

body.dark .wrapper {
  background: rgba(28,28,28,.28);
}

body.dark .badge {
  background: rgba(255,255,255,.08);
  color: #ffb6c7;
}

body.dark h1,
body.dark .sub {
  color: #fff;
}

/* ⚠️ NO TOCAR LOS BOTONES: dejar btn-secondary, btn-crear y avatar-btn tal cual */
  
/* Botón de luna centrado */
.dark-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
}

#toggleDark {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: white;
  color: black;
  font-size: 1.3rem;
  border: none;
  cursor: pointer;
  box-shadow: 0 5px 18px rgba(0,0,0,0.15);
  transition: transform 0.2s;
}

#toggleDark:hover {
  transform: scale(1.1);
}

body.dark #toggleDark {
  background: white;
  color: black;
  border: 1px solid rgba(255,255,255,.16);
}


*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--primary:#d57a8a;
--primary-dark:#bf6273;
--text:#2b2b2b;
--soft:#7b6d72;
--white:#f3f3f3;
}

body{
font-family:'Manrope',sans-serif;
min-height:100vh;
padding:28px 16px;
background:
linear-gradient(rgba(255, 255, 255, 0.61),rgba(255, 248, 246, 0.5)),
url("img/portada2.webp") center/cover no-repeat fixed;
color:var(--text);
}

/* CONTENEDOR */



.wrapper{
max-width:1050px;
margin:auto;
animation:fadeUp .6s ease;
}

/* HEADER */
.top{
text-align:center;
margin-bottom:22px;
}

.badge{
display:inline-block;
padding:8px 14px;
border-radius:999px;
background:white;
color:var(--primary);
font-size:.72rem;
font-weight:800;
box-shadow:0 8px 18px rgba(213,122,138,.14);
margin-bottom:14px;
}

h1{
font-size:2rem;
font-weight:800;
letter-spacing:-1px;
margin-bottom:6px;
}

.sub{
font-size:.95rem;
color:var(--soft);
}

/* BOTONES */
.actions{
display:flex;
justify-content:center;
gap:14px;
flex-wrap:wrap;
margin:28px 0 34px;
}

/* BASE BOTON */
.btn{
padding:12px 20px;
border-radius:999px;
font-size:.9rem;
font-weight:800;
text-decoration:none;
transition:.25s ease;
display:inline-block;
}

/* PERFIL */
.btn-primary{
background:linear-gradient(135deg,#d57a8a,#e596a6);
color:white;
box-shadow:0 10px 18px rgba(213,122,138,.22);
}
/* FOTO PERFIL BOTÓN */
.avatar-btn{
width:38px;
height:38px;
border-radius:50%;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:white;
box-shadow:0 6px 14px rgba(213,122,138,.18);
transition:.25s ease;
flex-shrink:0; /* evita que se deforme */
}

.avatar-btn img{
width:100%;
height:100%;
object-fit:cover; /* 🔥 esto es clave */
}

.avatar-btn:hover{
transform:scale(1.08);
box-shadow:0 10px 20px rgba(213,122,138,.25);
}

/* SECUNDARIOS */
.btn-secondary{
background:rgba(255,255,255,.82);
color:var(--primary);
border:1px solid rgba(255,255,255,.8);
backdrop-filter:blur(10px);
}

/* BOTÓN PRO ✨ */
.btn-crear{
background:linear-gradient(135deg,#ff8aa5,#ffb6c7);
color:white;
font-weight:900;
letter-spacing:.3px;
padding:14px 24px;
box-shadow:
0 12px 25px rgba(255,138,165,.35),
0 4px 10px rgba(0,0,0,.05);
position:relative;
overflow:hidden;
}

/* EFECTO BRILLO */
.btn-crear::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.5),transparent);
transition:.6s;
}

.btn-crear:hover::before{
left:100%;
}

/* HOVER GENERAL */
.btn:hover{
transform:translateY(-4px);
}

.btn-crear:hover{
transform:translateY(-4px) scale(1.04);
box-shadow:
0 18px 35px rgba(255,138,165,.45),
0 8px 16px rgba(0,0,0,.08);
}

/* RUTINAS */
#contenedorRutinas{
display:grid;
gap:18px;
}

/* CARD */
.card{
position:relative;
background:rgba(255,255,255,.76);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.72);
border-radius:24px;
padding:20px;
box-shadow:
0 10px 24px rgba(0,0,0,.05),
0 8px 16px rgba(213,122,138,.06);
animation:fadeUp .4s ease;
}

/* ICONOS */
.card-header{
position:absolute;
top:14px;
right:14px;
display:flex;
gap:8px;
}

.corazon,
.eliminar{
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:white;
font-size:1rem;
cursor:pointer;
box-shadow:0 6px 14px rgba(0,0,0,.06);
transition:.2s ease;
}

.corazon:hover,
.eliminar:hover{
transform:scale(1.08);
}

/* INFO */
.info{
font-size:.95rem;
line-height:1.65;
margin-bottom:6px;
color:#5a454d;
}

.info strong{
color:#222;
}

/* TÍTULOS */
.card h3{
font-size:1.05rem;
margin:16px 0 12px;
color:var(--primary);
font-weight:800;
}

/* PRODUCTOS */
.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:12px;
margin-bottom:14px;
}

.producto{
  text-decoration:none;
  background:rgba(255,255,255,.95);
  border-radius:18px;
  padding:12px;
  text-align:center;
  color:#333;
  box-shadow:0 8px 16px rgba(0,0,0,.04);
  transition:.25s ease;
  min-height:215px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  position:relative;
}

.producto:hover{
  transform:translateY(-5px) scale(1.02);
}

.producto img{
  width:100%;
  height:140px;
  object-fit:contain;
  background:white;
  padding:8px;
  border-radius:12px;
}

.producto span{
  font-size:.8rem;
  font-weight:700;
  line-height:1.3;
  min-height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.producto small{
  display:block;
  font-size:.7rem;
  color:#888;
  margin-top:4px;
}

.badge-tipo{
  position:absolute;
  top:8px;
  left:8px;
  background:#d57a8a;
  color:white;
  font-size:.6rem;
  padding:3px 6px;
  border-radius:6px;
}

.badge-rating{
  position:absolute;
  top:8px;
  right:8px;
  font-size:.65rem;
  background:white;
  padding:3px 6px;
  border-radius:6px;
  box-shadow:0 3px 6px rgba(0,0,0,.1);
}

/* VACÍO */
.empty{
text-align:center;
padding:36px 20px;
border-radius:22px;
background:rgba(255,255,255,.78);
color:#7c6c72;
font-size:.95rem;
}

/* ANIMACIÓN */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */
@media(max-width:768px){

h1{
font-size:1.7rem;
}

.actions{
flex-direction:column;
}

.btn{
width:100%;
}

.productos{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:500px){

body{
padding:20px 12px;
}

.card{
padding:18px 14px;
}

.producto{
min-height:190px;
}

.producto img{
height:100px;
}

.producto span{
font-size:.74rem;
}


}
</style>
</head>

<body>

<div class="dark-toggle">
  <button id="toggleDark">🌙</button>
</div>

<div class="wrapper">
  <div class="top">
    <div class="badge">✨ SKINMATCH</div>
    <h1>Mis rutinas guardadas</h1>
    <div class="sub">Tus recomendaciones listas cuando las necesites</div>
  </div>

  <div class="actions">
    <a href="perfil.html" class="avatar-btn">
      <img id="avatarMini" src="img/Perfil.png" alt="Perfil">
    </a>
    <a href="favoritas.html" class="btn btn-secondary">❤ Favoritas</a>
    <a href="formulario.html" class="btn btn-crear">✨ Crear nueva rutina</a>
  </div>

  <div id="contenedorRutinas"></div>
</div>

<script>
const btnDark = document.getElementById("toggleDark");

btnDark.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  if(document.body.classList.contains("dark")){
    localStorage.setItem("modo","oscuro");
  } else {
    localStorage.setItem("modo","claro");
  }
});

// Mantener modo al recargar
if(localStorage.getItem("modo") === "oscuro"){
  document.body.classList.add("dark");
}
</script>

<script src="productos.js"></script>
<script src="misRutinas.js"></script>
</body>
</html>
